<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracy Strategies — Coming Soon</title>
    <meta name="description" content="Tracy Strategies. Leadership. Strategy. Results. Coming Soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050d1f;
            color: #f0f2f5;
        }

        .page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('images/street-sunset-hero.jpg') center center / cover no-repeat;
            filter: brightness(0.35);
            z-index: 0;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(5, 13, 31, 0.3) 0%,
                rgba(5, 13, 31, 0.6) 50%,
                rgba(5, 13, 31, 0.85) 100%
            );
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 640px;
            padding: 2rem;
            animation: fadeUp 1.2s ease-out both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .accent-line {
            width: 60px;
            height: 2px;
            background: #d4af37;
            margin: 0 auto 2rem;
            animation: growLine 1s ease-out 0.4s both;
        }

        @keyframes growLine {
            from { width: 0; }
            to { width: 60px; }
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            letter-spacing: 0.04em;
            line-height: 1.15;
            margin-bottom: 0.6rem;
            color: #f0f2f5;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: clamp(0.85rem, 2vw, 1.05rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #d4af37;
            margin-bottom: 2.5rem;
        }

        .coming-soon {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: #c8d1dc;
            letter-spacing: 0.08em;
        }

        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="content">
            <div class="accent-line"></div>
            <h1 class="brand-name">Tracy Strategies</h1>
            <p class="tagline">Leadership &middot; Strategy &middot; Results</p>
            <p class="coming-soon">Coming Soon</p>
        </div>
        <div class="bottom-bar"></div>
    </div>
</body>
</html>
